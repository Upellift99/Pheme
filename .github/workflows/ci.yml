name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 3.11 is the declared minimum (requires-python); 3.14 is the runtime
        # image base. Test both ends so neither regresses.
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest -q

  docker:
    # Validate the multi-arch build on pull requests. Pushes to main and tags
    # are built and pushed to GHCR by docker-publish.yml instead.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - name: Build multi-arch image (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: false
          tags: pheme:ci
