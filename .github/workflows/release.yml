name: Release

# Cut a GitHub Release with auto-generated notes when a version tag is pushed.
# The matching container image is published by docker-publish.yml on the same tag.
on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
