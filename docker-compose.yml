services:
  pheme:
    build: .
    image: pheme:latest
    container_name: pheme
    restart: unless-stopped
    env_file: .env
    volumes:
      # State lives here. The container runs as non-root (uid 1000), so the host
      # directory must be writable by that uid. Create it once before first run:
      #   mkdir -p ./data && chown -R 1000:1000 ./data
      # (otherwise SQLite fails with "unable to open database file").
      - ./data:/data
    # The default bridge network reaches the CPE (192.168.8.1) through the Pi's
    # NAT with no extra config. If routing to the CPE subnet fails, fall back to
    # host networking by uncommenting the line below (and remove the bridge):
    # network_mode: host
